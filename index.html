<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEBİ - Bilişsel Beceri Oyunları</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="mebi-widget mw-page-container">
        <div class="mw-usage-bar" id="mwUsageBar">
            <div class="mw-usage-item" id="mwDailyUsageItem">
                <span class="mw-usage-label">Günlük süre:</span>
                <span id="mwDailyLimit" class="mw-usage-time">--</span>
            </div>

            <span class="mw-usage-separator" id="mwUsageSeparator">•</span>

            <div class="mw-usage-item" id="mwRemainingUsageItem">
                <span class="mw-usage-label">Kalan:</span>
                <span id="mwRemainingTimeBadge" class="mw-usage-time">--</span>
            </div>
        </div>

        <div class="mw-game-grid" id="gameGrid">
            <!-- Cards will be rendered by JavaScript -->
        </div>

        <div class="mw-modal-overlay" id="gameModalOverlay" aria-hidden="true">
            <div class="mw-modal" role="dialog" aria-modal="true" aria-labelledby="gameModalTitle">
                <div class="mw-modal-header">
                    <div class="mw-modal-title-wrap">
                        <h2 class="mw-modal-title" id="gameModalTitle">Oyun</h2>
                        <p class="mw-modal-remaining" id="gameModalRemaining">Kalan süre: --</p>
                    </div>
                    <button class="mw-modal-close" id="gameModalCloseBtn" aria-label="Oyunu kapat" type="button">&times;</button>
                </div>
                <div class="mw-modal-body">
                    <iframe
                        id="gameIframe"
                        class="mw-modal-iframe"
                        src="about:blank"
                        allow="fullscreen"
                        title="Oyun penceresi"
                        referrerpolicy="no-referrer"
                    ></iframe>
                </div>
            </div>
        </div>

        <div class="mw-toast-notification" id="mwToast" role="status" aria-live="polite">
            <div class="mw-toast-content-wrapper">
                <div class="mw-toast-alert-content">
                    <img
                        id="mwToastIcon"
                        class="mw-toast-icon"
                        src="https://ogm-small-cdn.eba.gov.tr/mebi/plugins/stay-fit/images/kanka.png"
                        alt="Bilgilendirme"
                    >
                    <p id="mwToastText" class="mw-toast-text"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        /*
         * Optional runtime config:
         * window.MebiOyunlarConfig = {
         *   dailyLimitMinutes: 30,
         *   showDailyLimit: true,
         *   showRemainingTime: true,
         *   theme: { toastIcon: 'https://...' }
         * };
         * URL param overrides are also supported:
         * ?showDailyLimit=false&showRemainingTime=false&dailyLimitMinutes=20
         */
        const DEFAULT_CONFIG = {
            dailyLimitMinutes: 1,
            showDailyLimit: true,
            showRemainingTime: true,
            toastIcon: 'https://ogm-small-cdn.eba.gov.tr/mebi/plugins/stay-fit/images/kanka.png'
        };

        function parseBooleanFlag(value, fallback) {
            if (value === undefined || value === null) {
                return fallback;
            }

            if (typeof value === 'string') {
                const normalized = value.trim().toLowerCase();
                if (normalized === 'false' || normalized === '0' || normalized === 'no') {
                    return false;
                }
                if (normalized === 'true' || normalized === '1' || normalized === 'yes') {
                    return true;
                }
            }

            return Boolean(value);
        }

        function resolveRuntimeConfig() {
            const source = (window.MebiOyunlarConfig && typeof window.MebiOyunlarConfig === 'object')
                ? window.MebiOyunlarConfig
                : {};
            const display = (source.display && typeof source.display === 'object') ? source.display : {};
            const gameplay = (source.gameplay && typeof source.gameplay === 'object') ? source.gameplay : {};
            const theme = (source.theme && typeof source.theme === 'object') ? source.theme : {};
            const queryParams = new URLSearchParams(window.location.search);

            const dailyLimitMinutesRaw = queryParams.get('dailyLimitMinutes') !== null
                ? queryParams.get('dailyLimitMinutes')
                : (gameplay.dailyLimitMinutes !== undefined ? gameplay.dailyLimitMinutes : source.dailyLimitMinutes);
            const parsedDailyLimit = Number(dailyLimitMinutesRaw);
            const showDailyLimitRaw = queryParams.get('showDailyLimit') !== null
                ? queryParams.get('showDailyLimit')
                : (display.showDailyLimit !== undefined ? display.showDailyLimit : source.showDailyLimit);
            const showRemainingTimeRaw = queryParams.get('showRemainingTime') !== null
                ? queryParams.get('showRemainingTime')
                : (display.showRemainingTime !== undefined ? display.showRemainingTime : source.showRemainingTime);
            const toastIconRaw = queryParams.get('toastIcon') !== null
                ? queryParams.get('toastIcon')
                : ((typeof theme.toastIcon === 'string' && theme.toastIcon.trim())
                    ? theme.toastIcon.trim()
                    : source.toastIcon);

            return {
                dailyLimitMinutes: (Number.isFinite(parsedDailyLimit) && parsedDailyLimit > 0)
                    ? Math.round(parsedDailyLimit)
                    : DEFAULT_CONFIG.dailyLimitMinutes,
                showDailyLimit: parseBooleanFlag(
                    showDailyLimitRaw,
                    DEFAULT_CONFIG.showDailyLimit
                ),
                showRemainingTime: parseBooleanFlag(
                    showRemainingTimeRaw,
                    DEFAULT_CONFIG.showRemainingTime
                ),
                toastIcon: (typeof toastIconRaw === 'string' && toastIconRaw.trim())
                    ? toastIconRaw.trim()
                    : ((typeof source.toastIcon === 'string' && source.toastIcon.trim())
                        ? source.toastIcon.trim()
                        : DEFAULT_CONFIG.toastIcon)
            };
        }

        const runtimeConfig = resolveRuntimeConfig();
        const DAILY_LIMIT_MINUTES = runtimeConfig.dailyLimitMinutes;
        const DAILY_LIMIT_MS = DAILY_LIMIT_MINUTES * 60 * 1000;
        const STORAGE_KEY = 'mebi_oyunlar_daily_usage_v1';

        const sessionState = {
            isActive: false,
            lastTickAt: 0,
            intervalId: null
        };

        let toastTimer = null;
        let fallbackUsagePayload = null;

        const ui = {
            overlay: null,
            closeButton: null,
            modalTitle: null,
            modalRemaining: null,
            iframe: null,
            toast: null,
            toastText: null,
            toastIcon: null,
            usageBar: null,
            dailyUsageItem: null,
            remainingUsageItem: null,
            usageSeparator: null,
            dailyLimit: null,
            remainingBadge: null
        };

        function getTodayKey() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return year + '-' + month + '-' + day;
        }

        function readUsagePayload() {
            try {
                const payload = window.localStorage.getItem(STORAGE_KEY);
                if (payload) {
                    fallbackUsagePayload = payload;
                }
                return payload || fallbackUsagePayload;
            } catch (error) {
                return fallbackUsagePayload;
            }
        }

        function saveUsageState(state) {
            const payload = JSON.stringify(state);
            fallbackUsagePayload = payload;

            try {
                window.localStorage.setItem(STORAGE_KEY, payload);
            } catch (error) {
                // localStorage is unavailable; fallback payload still keeps current session state
            }
        }

        function loadUsageState() {
            const today = getTodayKey();
            let parsed = null;

            try {
                const payload = readUsagePayload();
                if (payload) {
                    parsed = JSON.parse(payload);
                }
            } catch (error) {
                parsed = null;
            }

            let state = {
                date: today,
                usedMs: 0
            };

            if (
                parsed &&
                typeof parsed === 'object' &&
                typeof parsed.date === 'string' &&
                Number.isFinite(parsed.usedMs)
            ) {
                state.date = parsed.date;
                state.usedMs = parsed.usedMs;
            }

            if (state.date !== today) {
                state.date = today;
                state.usedMs = 0;
                saveUsageState(state);
            }

            state.usedMs = Math.max(0, Math.min(DAILY_LIMIT_MS, state.usedMs));
            return state;
        }

        function addUsage(deltaMs) {
            if (!Number.isFinite(deltaMs) || deltaMs <= 0) {
                return loadUsageState();
            }

            const usage = loadUsageState();
            usage.usedMs = Math.min(DAILY_LIMIT_MS, usage.usedMs + deltaMs);
            saveUsageState(usage);
            return usage;
        }

        function getRemainingMs() {
            const usage = loadUsageState();
            return Math.max(0, DAILY_LIMIT_MS - usage.usedMs);
        }

        function formatDuration(ms) {
            const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            if (hours > 0) {
                return String(hours) + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
            }

            return String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
        }

        function applyDisplayConfig() {
            const shouldShowDaily = runtimeConfig.showDailyLimit;
            const shouldShowRemaining = runtimeConfig.showRemainingTime;

            ui.dailyUsageItem.classList.toggle('mw-hidden', !shouldShowDaily);
            ui.remainingUsageItem.classList.toggle('mw-hidden', !shouldShowRemaining);
            ui.usageSeparator.classList.toggle('mw-hidden', !(shouldShowDaily && shouldShowRemaining));
            ui.usageBar.classList.toggle('mw-hidden', !(shouldShowDaily || shouldShowRemaining));
            ui.modalRemaining.classList.toggle('mw-hidden', !shouldShowRemaining);

            if (runtimeConfig.toastIcon) {
                ui.toastIcon.src = runtimeConfig.toastIcon;
            }
        }

        function updateRemainingUI() {
            const remainingMs = getRemainingMs();

            if (runtimeConfig.showDailyLimit) {
                ui.dailyLimit.textContent = String(DAILY_LIMIT_MINUTES) + ' dakika';
            }

            if (runtimeConfig.showRemainingTime) {
                const remainingText = formatDuration(remainingMs);
                ui.remainingBadge.textContent = remainingText;
                ui.modalRemaining.textContent = 'Kalan süre: ' + remainingText;
            }
        }

        function showToast(message, variant) {
            const toastType = variant || 'info';
            ui.toastText.textContent = message;
            ui.toast.className = 'mw-toast-notification show ' + toastType;

            if (toastTimer) {
                clearTimeout(toastTimer);
            }

            toastTimer = setTimeout(function () {
                ui.toast.className = 'mw-toast-notification';
            }, 3500);
        }

        function startSessionTimer() {
            if (sessionState.intervalId) {
                clearInterval(sessionState.intervalId);
            }

            sessionState.isActive = true;
            sessionState.lastTickAt = Date.now();

            sessionState.intervalId = setInterval(function () {
                const now = Date.now();
                const delta = now - sessionState.lastTickAt;
                sessionState.lastTickAt = now;

                const usage = addUsage(delta);
                updateRemainingUI();

                if (usage.usedMs >= DAILY_LIMIT_MS) {
                    closeGameModal(true);
                }
            }, 1000);
        }

        function stopSessionTimer() {
            if (!sessionState.isActive) {
                return;
            }

            const now = Date.now();
            const delta = now - sessionState.lastTickAt;
            addUsage(delta);

            if (sessionState.intervalId) {
                clearInterval(sessionState.intervalId);
            }

            sessionState.intervalId = null;
            sessionState.isActive = false;
            sessionState.lastTickAt = 0;
            updateRemainingUI();
        }

        function closeGameModal(limitReached) {
            if (!ui.overlay.classList.contains('is-open')) {
                return;
            }

            stopSessionTimer();
            ui.overlay.classList.remove('is-open');
            ui.overlay.setAttribute('aria-hidden', 'true');
            ui.iframe.src = 'about:blank';

            if (limitReached) {
                showToast('Günlük oyun süreniz doldu. Yarın tekrar deneyebilirsiniz.', 'warning');
            }
        }

        function openGameModal(game) {
            if (!game || !game.url) {
                showToast('Bu oyun şu an erişime açık değil.', 'info');
                return;
            }

            if (getRemainingMs() <= 0) {
                showToast('Günlük oyun süreniz doldu. Lütfen yarın tekrar deneyin.', 'warning');
                return;
            }

            ui.modalTitle.textContent = game.title;
            ui.iframe.src = game.url;
            ui.overlay.classList.add('is-open');
            ui.overlay.setAttribute('aria-hidden', 'false');
            startSessionTimer();
            updateRemainingUI();
        }

        // Game data
        const games = [
            {
                id: 0,
                title: '2D Puzzle',
                description: 'Mantıksal düşünme ve problem çözme becerilerinizi geliştirmek için tasarlanmış eğitici bulmacalar',
                image: 'assets/2dpuzzle.png',
                category: 'Mantık',
                url: 'https://ogmmateryal.eba.gov.tr/oyun/2d-puzzle/gameindex.html'
            }, 
            {
                id: 1,
                title: 'Hafıza Arenası',
                description: 'Kartları eşleştir ve hafızanı güçlendir.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Hafıza'
            },
            {
                id: 2,
                title: 'Puzzle',
                description: 'Parçaları birleştir, büyük resmi gör.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Mantık'
            },
            {
                id: 3,
                title: 'Mantık Bulmacası',
                description: 'Sıradaki şekli bul ve deseni tamamla.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Problem Çözme'
            },
            {
                id: 4,
                title: 'Dikkat Testi',
                description: 'Resimdeki gizli nesneleri bul.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Dikkat'
            },
            {
                id: 5,
                title: 'Hız Serüveni',
                description: 'Hedeflere en hızlı sen tıkla!',
                image: 'assets/game-cover-placeholder.png',
                category: 'Refleks'
            },
            {
                id: 6,
                title: 'Kelime Bulmaca',
                description: 'Gizlenmiş kelimeleri bul.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Dil Gelişimi'
            },
            {
                id: 7,
                title: 'Meyve Sudoku',
                description: 'Meyveleri doğru yerlere yerleştir.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Mantık'
            },
            {
                id: 8,
                title: 'Şekil Eşleştirme',
                description: 'Şekilleri gölgeleriyle eşleştir.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Görsel Algı'
            },
            {
                id: 9,
                title: 'Labirent',
                description: 'Tavşanı havuca ulaştır.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Problem Çözme'
            },
            {
                id: 10,
                title: 'Matematik Oyunu',
                description: 'Eğlenceli işlemlerle matematiği sev.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Sayısal'
            },
            {
                id: 11,
                title: 'Renk Ayrımı',
                description: 'Topları renklerine göre kutulara at.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Sınıflandırma'
            },
            {
                id: 12,
                title: 'Boyut Sıralama',
                description: 'Çiçekleri küçükten büyüğe sırala.',
                image: 'assets/game-cover-placeholder.png',
                category: 'Sıralama'
            }
        ];

        /**
         * Creates a single game card HTML element.
         * @param {Object} game
         * @returns {HTMLElement}
         */
        function createGameCard(game) {
            const card = document.createElement('div');
            card.className = 'mw-card';
            card.setAttribute('data-game-id', game.id);
            if (game.url) {
                card.setAttribute('data-url', game.url);
            }

            card.innerHTML = `
                <div class="mw-card-image">
                    <img src="${game.image}" alt="${game.title}" loading="lazy">
                </div>
                <div class="mw-card-body">
                    <h3 class="mw-card-title">${game.title}</h3>
                    <p class="mw-card-desc">${game.description}</p>
                    <button class="mw-btn" data-game-id="${game.id}">
                        Zihnini Harekete Geçir
                    </button>
                </div>
            `;

            return card;
        }

        /**
         * Renders all game cards into the grid.
         */
        function renderGames() {
            const grid = document.getElementById('gameGrid');
            const fragment = document.createDocumentFragment();

            games.forEach(function (game) {
                fragment.appendChild(createGameCard(game));
            });

            grid.appendChild(fragment);
        }

        /**
         * Handles play button clicks via event delegation.
         */
        function initEventListeners() {
            const grid = document.getElementById('gameGrid');

            grid.addEventListener('click', function (e) {
                // Button click
                const button = e.target.closest('button[data-game-id]');
                if (button) {
                    e.stopPropagation();
                    const gameId = parseInt(button.getAttribute('data-game-id'), 10);
                    const game = games.find(function (g) { return g.id === gameId; });
                    openGameModal(game);
                    return;
                }

                // Card click
                const card = e.target.closest('.mw-card[data-game-id]');
                if (card) {
                    const gameId = parseInt(card.getAttribute('data-game-id'), 10);
                    const game = games.find(function (g) { return g.id === gameId; });
                    openGameModal(game);
                }
            });
        }

        function initModalListeners() {
            ui.closeButton.addEventListener('click', function () {
                closeGameModal(false);
            });

            ui.overlay.addEventListener('click', function (event) {
                if (event.target === ui.overlay) {
                    closeGameModal(false);
                }
            });

            document.addEventListener('keydown', function (event) {
                if (event.key === 'Escape' && ui.overlay.classList.contains('is-open')) {
                    closeGameModal(false);
                }
            });

            window.addEventListener('beforeunload', function () {
                stopSessionTimer();
            });
        }

        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', function () {
            ui.overlay = document.getElementById('gameModalOverlay');
            ui.closeButton = document.getElementById('gameModalCloseBtn');
            ui.modalTitle = document.getElementById('gameModalTitle');
            ui.modalRemaining = document.getElementById('gameModalRemaining');
            ui.iframe = document.getElementById('gameIframe');
            ui.toast = document.getElementById('mwToast');
            ui.toastText = document.getElementById('mwToastText');
            ui.toastIcon = document.getElementById('mwToastIcon');
            ui.usageBar = document.getElementById('mwUsageBar');
            ui.dailyUsageItem = document.getElementById('mwDailyUsageItem');
            ui.remainingUsageItem = document.getElementById('mwRemainingUsageItem');
            ui.usageSeparator = document.getElementById('mwUsageSeparator');
            ui.dailyLimit = document.getElementById('mwDailyLimit');
            ui.remainingBadge = document.getElementById('mwRemainingTimeBadge');

            applyDisplayConfig();
            updateRemainingUI();
            renderGames();
            initEventListeners();
            initModalListeners();
        });
    </script>
</body>
</html>
